services:
  cozytouch-api:
    build: .
    image: cozytouch-api:latest
    container_name: cozytouch-api
    restart: unless-stopped
    env_file: .env
    environment:
      PRESETS_FILE: "${PRESETS_FILE:-/data/presets.json}"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${PORT:-8000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
